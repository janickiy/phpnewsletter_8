services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: phpnewsletter_app
    env_file:
      - path: ../.env
        required: false
    init: true
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      COMPOSER_INSTALL: ${COMPOSER_INSTALL:-true}
      COMPOSER_BLOCK_SECURITY_ADVISORIES: ${COMPOSER_BLOCK_SECURITY_ADVISORIES:-false}
    volumes:
      - ..:/var/www/html
      - composer-cache:/tmp/composer
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: phpnewsletter_mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-phpnewsletter}
      MYSQL_USER: ${DB_USERNAME:-phpnewsletter}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  composer-cache:
  mysql_data:
