memory_limit=512M
upload_max_filesize=256M
post_max_size=300M
max_file_uploads=50
max_execution_time=0
max_input_time=600
date.timezone=UTC

display_errors=Off
log_errors=On

opcache.enable=1
opcache.enable_cli=1
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.memory_consumption=128
opcache.max_accelerated_files=20000
